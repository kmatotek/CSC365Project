permissions:
  contents: write

name: Build LaTeX Poster

on:
  push:
    paths:
      - "poster/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: |
            ~/.texlive
            ~/.cache/texmf-var
          key: texlive-${{ runner.os }}-${{ hashFiles('poster/**') }}
          restore-keys: |
            texlive-${{ runner.os }}-

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            latexmk \
            poppler-utils

      - name: Compile LaTeX
        working-directory: poster
        run: |
          latexmk -xelatex -interaction=nonstopmode -halt-on-error main.tex
          cp main.pdf ../poster.pdf

      - name: Convert PDF to PNG
        run: |
          pdftoppm -png -singlefile poster.pdf poster

      - name: Delete existing latest release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: "latest"
              });

              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id
              });

              console.log("Deleted existing latest release");
            } catch (e) {
              console.log("No existing release found, continuing...");
            }

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Poster
          make_latest: true
          files: |
            poster.pdf
            poster.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
